<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Cadastro</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f4f4f4; display: flex;
           align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: white; padding: 2rem 2.25rem; border-radius: 12px;
            border: 1px solid #e0e0e0; width: 100%; max-width: 380px; }
    h1 { font-size: 20px; margin-bottom: 0.25rem; }
    .subtitle { font-size: 13px; color: #666; margin-bottom: 1.5rem; }
    label { font-size: 13px; color: #555; display: block; margin-bottom: 5px; }
    .field { margin-bottom: 1rem; }
    input { width: 100%; height: 38px; padding: 0 12px; border: 1px solid #ccc;
            border-radius: 8px; font-size: 14px; }
    input:focus { outline: none; border-color: #1D9E75; box-shadow: 0 0 0 2px #9FE1CB; }
    .btn { width: 100%; height: 38px; background: #1D9E75; color: white;
           border: none; border-radius: 8px; font-size: 14px; font-weight: 500;
           cursor: pointer; margin-top: 0.5rem; }
    .btn:hover { background: #0F6E56; }
    .alert { padding: 10px 12px; border-radius: 8px; font-size: 13px; margin-bottom: 1rem; }
    .alert-danger  { background: #FCEBEB; color: #A32D2D; border: 1px solid #F09595; }
    .alert-success { background: #EAF3DE; color: #3B6D11; border: 1px solid #97C459; }
    .toggle { text-align: center; font-size: 13px; color: #666; margin-top: 1rem; }
    .toggle a { color: #1D9E75; font-weight: 500; text-decoration: none; }
  </style>
</head>
<body>
<div class="card">
  <h1>Cadastro</h1>
  <p class="subtitle">Crie sua conta</p>

{% with messages = get_flashed_messages(with_categories=true) %}
  {% for category, message in messages %}
    <div class="alert alert-{{ category }}">{{ message }}</div>
  {% endfor %}
{% endwith %}

  <form method="POST">
    <div class="field">
      <label>Usuário</label>
      <input type="text" name="username" required placeholder="escolha um usuário">
    </div>
    <div class="field">
      <label>E-mail</label>
      <input type="email" name="email" required placeholder="seu@email.com">
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" name="password" required placeholder="••••••••">
    </div>
    <button class="btn" type="submit">Criar conta</button>
  </form>

  <div class="toggle">
    Já tem conta? <a href="{{ url_for('login') }}">Entrar</a>
  </div>
</div>
</body>
</html>
