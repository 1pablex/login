<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Redefinir senha</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="card">
  <h1>Nova senha</h1>
  <p class="subtitle">Escolha uma senha segura</p>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST">
    <input type="hidden" name="token" value="{{ token }}">
    <div class="field">
      <label>Nova senha</label>
      <input type="password" name="password" required placeholder="••••••••" minlength="8">
    </div>
    <div class="field">
      <label>Confirmar senha</label>
      <input type="password" name="confirm_password" required placeholder="••••••••" minlength="8">
    </div>
    <button class="btn" type="submit">Redefinir senha</button>
  </form>
</div>
</body>
</html>
