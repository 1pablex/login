
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Verificação de Dois Fatores</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="card">
  <h1>Verificação</h1>
  <p class="subtitle">Digite o código enviado para o seu e-mail</p>

{% with messages = get_flashed_messages(with_categories=true) %}
  {% for category, message in messages %}
    <div class="alert alert-{{ category }}">{{ message }}</div>
  {% endfor %}
{% endwith %}

  <form method="POST">
    <div class="field">
      <label>Código de verificação</label>
      <input type="text" name="codigo" required placeholder="000000"
             maxlength="6" autocomplete="one-time-code"
             style="letter-spacing:8px;font-size:24px;text-align:center;">
    </div>
    <button class="btn" type="submit">Verificar</button>
  </form>

  <div class="toggle">
    <a href="{{ url_for('login') }}">← Voltar ao login</a>
  </div>
</div>
</body>
</html>
